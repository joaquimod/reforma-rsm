<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            const CLAU_ACCES = "RSM2026";

            // Auto-auth via URL Hash (works better for local files)
            // Format: file.html#auth=RSM2026
            if (window.location.hash.includes('auth=' + CLAU_ACCES)) {
                sessionStorage.setItem('rsm_access', 'true');
            }

            if (sessionStorage.getItem('rsm_access') !== 'true') {
                let pass = prompt("🔐 ACCÉS PRIVAT - CASA RSM\n\nIntrodueix la clau d'accés per visualitzar el document:");
                if (pass === CLAU_ACCES) {
                    sessionStorage.setItem('rsm_access', 'true');
                } else {
                    alert("Clau incorrecta.");
                    document.documentElement.style.display = 'none';
                    window.location.href = "https://github.com";
                }
            }
        })();
    </script>
    <title>Visor de Document | Casa RSM</title>
    <script src="docs_bundle.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --bg-color: #050812;
            --text-color: #cbd5e1;
            --bg-gradient: radial-gradient(circle at top right, rgba(0, 242, 255, 0.05), transparent);
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
            --title-color: #ffffff;
            --h2-color: #00f2ff;
            --h3-color: #ffffff;
            --primary-accent: #00f2ff;
            --code-bg: rgba(0, 242, 255, 0.1);
            --code-color: #00f2ff;
            --blockquote-bg: rgba(0, 242, 255, 0.03);
            --blockquote-text: #94a3b8;
        }

        html.light {
            --bg-color: #f8fafc;
            --text-color: #334155;
            --bg-gradient: radial-gradient(circle at top right, rgba(14, 165, 233, 0.1), transparent);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(148, 163, 184, 0.2);
            --title-color: #0f172a;
            --h2-color: #0284c7;
            --h3-color: #1e293b;
            --primary-accent: #0284c7;
            --code-bg: rgba(14, 165, 233, 0.1);
            --code-color: #0369a1;
            --blockquote-bg: rgba(14, 165, 233, 0.03);
            --blockquote-text: #475569;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            transition: background-color 0.3s, color 0.3s;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            transition: background-color 0.3s, border-color 0.3s;
        }

        #content h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--title-color);
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
            transition: color 0.3s, border-color 0.3s;
        }

        #content h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--h2-color);
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            transition: color 0.3s;
        }

        #content h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--h3-color);
            margin-top: 2rem;
            margin-bottom: 1rem;
            transition: color 0.3s;
        }

        #content p {
            margin-bottom: 1.5rem;
            line-height: 1.8;
        }

        #content li {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.8rem;
            list-style-type: none;
        }

        #content li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: var(--primary-accent);
            font-weight: bold;
            transition: color 0.3s;
        }

        #content code {
            background: var(--code-bg);
            color: var(--code-color);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
            transition: background-color 0.3s, color 0.3s;
        }

        #content blockquote {
            border-left: 4px solid var(--primary-accent);
            background: var(--blockquote-bg);
            padding: 1.5rem 2rem;
            border-radius: 0 20px 20px 0;
            margin: 2rem 0;
            font-style: italic;
            color: var(--blockquote-text);
            transition: background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        #content table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 1.5rem;
        }
        #content th, #content td {
            border: 1px solid var(--glass-border);
            padding: 10px 15px;
            text-align: left;
            transition: border-color 0.3s;
        }
        #content th {
            background-color: var(--code-bg);
            color: var(--title-color);
            font-weight: 600;
            transition: background-color 0.3s, color 0.3s;
        }
        #content tr:nth-child(even) {
            background-color: var(--blockquote-bg);
            transition: background-color 0.3s;
        }

        /* Overrides for elements with utility text color classes in light mode */
        html.light a.glass-card {
            color: #334155 !important;
        }
        html.light a.glass-card:hover {
            background: rgba(148, 163, 184, 0.15) !important;
        }
        html.light #file-name {
            color: #475569 !important;
        }
        html.light footer {
            color: #94a3b8 !important;
        }
        html.light #content .grid {
            background: rgba(148, 163, 184, 0.05) !important;
            border-color: rgba(148, 163, 184, 0.2) !important;
        }
        html.light #content .grid div.text-slate-500 {
            color: #475569 !important;
        }
        html.light #content .grid div.text-cyan-400 {
            color: #0284c7 !important;
        }
    </style>
</head>

<body class="p-6 md:p-12 lg:p-20">
    <div class="max-w-4xl mx-auto space-y-12">
        <header class="flex justify-between items-center" id="header" style="opacity: 0;">
            <div class="flex gap-4">
                <a href="index.html"
                    class="glass-card px-6 py-3 rounded-2xl text-slate-400 hover:bg-white/5 transition-all font-bold text-sm">←
                    Tornar a l'Inici</a>
                <a id="btn-back-pe" href="index.html?phase=pe"
                    class="hidden glass-card px-6 py-3 rounded-2xl text-purple-400 border-purple-500/30 hover:bg-purple-400/10 transition-all font-bold text-sm">←
                    Tornar al PE</a>
            </div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="glass-card w-12 h-12 rounded-2xl flex items-center justify-center text-lg hover:bg-white/5 transition-all" aria-label="Cambiar tema">
                    ☀️
                </button>
                <div id="file-name" class="text-[10px] uppercase tracking-[3px] font-bold text-slate-500">Document</div>
            </div>
        </header>
        <div id="wrapper" class="glass-card p-10 md:p-16 lg:p-20 min-h-[60vh]" style="opacity: 0;">
            <div id="content" class="animate-pulse">Carregant document...</div>
        </div>
        <footer class="text-center text-[10px] text-slate-600 uppercase tracking-widest pt-8" id="footer"
            style="opacity: 0;">Casa RSM | Project Twin 2026</footer>
    </div>

    <script>
        // Theme switcher logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        
        function getStoredTheme() {
            return localStorage.getItem('theme') || 'dark';
        }
        
        function applyTheme(theme) {
            if (theme === 'light') {
                document.documentElement.classList.add('light');
                themeToggleBtn.innerHTML = '🌙';
            } else {
                document.documentElement.classList.remove('light');
                themeToggleBtn.innerHTML = '☀️';
            }
        }
        
        // Initial theme check
        const initialTheme = getStoredTheme();
        applyTheme(initialTheme);
        
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.classList.contains('light') ? 'light' : 'dark';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
        });

        const contentDiv = document.getElementById('content');
        function renderMarkdown(text) {
            contentDiv.classList.remove('animate-pulse');
            
            let html = "";
            let mdBody = text;
            
            if (text.startsWith('---')) {
                const parts = text.split('---');
                if (parts.length >= 3) {
                    const yamlStr = parts[1];
                    mdBody = parts.slice(2).join('---');
                    
                    const lines = yamlStr.split('\n');
                    const metadata = {};
                    lines.forEach(line => {
                        const match = line.match(/^([^:]+):\s*(.*)$/);
                        if (match) {
                            metadata[match[1].trim()] = match[2].trim();
                        }
                    });
                    
                    if (Object.keys(metadata).length > 0) {
                        html += '<div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-12 p-10 bg-white/[0.03] rounded-[32px] border border-white/10 shadow-2xl">';
                        for (const [key, value] of Object.entries(metadata)) {
                            if (!value || value === 'null' || value === 'undefined' || value.trim() === '') continue;
                            const label = key.replace(/_/g, ' ').toUpperCase();
                            html += `<div class="space-y-1">
                                <div class="text-[9px] uppercase tracking-[2px] text-slate-500 font-black">${label}</div>
                                <div class="text-xs text-cyan-400 font-bold leading-tight">${value}</div>
                            </div>`;
                        }
                        html += '</div>';
                    }
                }
            }
            
            html += marked.parse(mdBody);
            contentDiv.innerHTML = html;
            gsap.from("#content > *", { opacity: 0, y: 15, duration: 0.5, stagger: 0.1, ease: "power2.out" });
        }

        async function init() {
            gsap.to("#header", { opacity: 1, y: 0, duration: 1 });
            gsap.to("#wrapper", { opacity: 1, y: 0, duration: 1, delay: 0.2 });
            gsap.to("#footer", { opacity: 1, duration: 1, delay: 0.8 });

            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('file');
            const from = urlParams.get('from');

            if (from === 'pe') {
                document.getElementById('btn-back-pe').classList.remove('hidden');
            }

            if (!fileName) { contentDiv.innerHTML = "❌ Fitxer no especificat."; return; }
            document.getElementById('file-name').textContent = fileName.replace('.md', '').replace(/_/g, ' ');

            // Check pre-loaded bundle first (works locally and on web)
            if (window.DOCS_BUNDLE && (window.DOCS_BUNDLE[fileName] || window.DOCS_BUNDLE[fileName.split('/').pop()])) {
                const content = window.DOCS_BUNDLE[fileName] || window.DOCS_BUNDLE[fileName.split('/').pop()];
                renderMarkdown(content);
                return;
            }

            if (window.location.protocol === 'file:') {
                contentDiv.innerHTML = `<div class="text-center py-20 space-y-8">
                    <h2 class="text-2xl font-bold text-white">Mode Local</h2>
                    <p class="text-slate-400">Selecciona el fitxer <b>${fileName}</b>:</p>
                    <input type="file" id="local-file-selector" class="hidden" accept=".md,.txt">
                    <button onclick="document.getElementById('local-file-selector').click()" class="bg-cyan-400 text-slate-900 px-8 py-4 rounded-2xl font-bold">SELECCIONA FITXER</button>
                </div>`;
                document.getElementById('local-file-selector').onchange = (e) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => renderMarkdown(ev.target.result);
                    reader.readAsText(e.target.files[0]);
                };
            } else {
                try {
                    const res = await fetch(fileName);
                    if (!res.ok) throw new Error();
                    renderMarkdown(await res.text());
                } catch { contentDiv.innerHTML = "❌ Error carregant fitxer."; }
            }
        }
        init();
    </script>
</body>

</html>
