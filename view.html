<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            const CLAU_ACCES = "RSM2026";
            if (sessionStorage.getItem('rsm_access') !== 'true') {
                let pass = prompt("🔐 ACCÉS PRIVAT - CASA RSM\n\nIntrodueix la clau d'accés per visualitzar el document:");
                if (pass === CLAU_ACCES) {
                    sessionStorage.setItem('rsm_access', 'true');
                } else {
                    alert("Clau incorrecta.");
                    document.documentElement.style.display = 'none';
                    window.location.href = "https://github.com";
                }
            }
        })();
    </script>
    <title>Visor de Document | Casa RSM</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Llibreria per renderitzar Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --bg: #0f172a;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--bg);
            color: #cbd5e1;
            font-family: 'Outfit', sans-serif;
            line-height: 1.6;
            padding: 2rem 5%;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
        }

        .btn-back {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Estils per al contingut Markdown */
        #content h1 {
            color: white;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 0.5rem;
            margin-top: 2rem;
        }

        #content h2 {
            color: var(--primary);
            margin-top: 2rem;
        }

        #content h3 {
            color: white;
            margin-top: 1.5rem;
        }

        #content strong {
            color: white;
        }

        #content code {
            background: rgba(0, 242, 255, 0.1);
            color: var(--primary);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
        }

        #content blockquote {
            border-left: 4px solid var(--primary);
            padding-left: 1.5rem;
            margin: 1.5rem 0;
            color: #94a3b8;
            font-style: italic;
        }

        #content ul {
            padding-left: 1.5rem;
        }

        #content li {
            margin-bottom: 0.8rem;
        }

        #content hr {
            border: 0;
            border-top: 1px solid var(--border);
            margin: 2rem 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <a href="index.html" class="btn-back">← Tornar al Dashboard</a>
            <div id="file-name"
                style="font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px;">Document
            </div>
        </header>
        <div id="content">Carregant document...</div>
    </div>

    <script>
        const contentDiv = document.getElementById('content');
        const fileNameDiv = document.getElementById('file-name');

        function renderMarkdown(text) {
            contentDiv.innerHTML = marked.parse(text);
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('file');

            if (!fileName) {
                contentDiv.innerHTML = "No s'ha especificat cap fitxer.";
                return;
            }

            fileNameDiv.textContent = fileName.replace(/_/g, ' ');

            // DETECCIÓ DE MODE (WEB vs LOCAL)
            if (window.location.protocol === 'file:') {
                // MODE LOCAL: El navegador bloqueja 'fetch', necessitem acció de l'usuari
                contentDiv.innerHTML = `
                    <div style="background: rgba(0, 242, 255, 0.05); border: 1px solid var(--primary); padding: 2rem; border-radius: 16px; text-align: center;">
                        <div style="font-size: 2rem; margin-bottom: 1rem;">🏠 Mode Local</div>
                        <p style="margin-bottom: 1.5rem;">Per seguretat, el navegador requereix que confirmis el fitxer per renderitzar-lo localment:</p>
                        <input type="file" id="local-file-selector" style="display: none;" accept=".md,.txt">
                        <button onclick="document.getElementById('local-file-selector').click()" 
                                style="background: var(--primary); color: #0f172a; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 700; cursor: pointer;">
                            📁 Selecciona "${fileName}" per carregar-lo
                        </button>
                    </div>`;

                document.getElementById('local-file-selector').addEventListener('change', function (e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => renderMarkdown(e.target.result);
                        reader.readAsText(file);
                    }
                });
            } else {
                // MODE WEB (GitHub Pages): Carreguem automàticament
                try {
                    const response = await fetch(fileName);
                    if (!response.ok) throw new Error('NOT_FOUND');
                    const text = await response.text();
                    renderMarkdown(text);
                } catch (error) {
                    contentDiv.innerHTML = "❌ Error: No s'ha pogut carregar el fitxer automàticament.";
                }
            }
        }
        init();
    </script>
</body>

</html>
